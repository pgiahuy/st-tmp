{% extends 'layout/base.html' %}

{% block title %}Đổi mật khẩu{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="card shadow p-3 mx-auto" style="max-width: 400px;">
        <h5 class="text-center mb-3">Đổi mật khẩu</h5>

        <form method="post">

            <div class="input-group mb-2">
                <input type="password" name="old_password"
                       class="form-control"
                       placeholder="Mật khẩu cũ" required>
                <span class="input-group-text toggle-password" style="cursor:pointer;">
                    <i class="bi bi-eye"></i>
                </span>
            </div>

            <div class="input-group mb-2">
                <input type="password" name="new_password"
                       class="form-control"
                       placeholder="Mật khẩu mới" required>
                <span class="input-group-text toggle-password" style="cursor:pointer;">
                    <i class="bi bi-eye"></i>
                </span>
            </div>

            <div class="input-group mb-3">
                <input type="password" name="confirm_password"
                       class="form-control"
                       placeholder="Xác nhận mật khẩu" required>
                <span class="input-group-text toggle-password" style="cursor:pointer;">
                    <i class="bi bi-eye"></i>
                </span>
            </div>

            {% if err_msg %}
            <div class="text-danger small mb-2">{{ err_msg }}</div>
            {% endif %}

            {% if success_msg %}
            <div class="text-success small mb-2">{{ success_msg }}</div>
            {% endif %}

            <button type="submit" class="btn btn-warning w-100">
                Đổi mật khẩu
            </button>
        </form>
    </div>
</div>
<script>
document.querySelectorAll('.toggle-password').forEach(toggle => {
    toggle.addEventListener('click', () => {
        const input = toggle.previousElementSibling;
        const icon = toggle.querySelector('i');

        if (input.type === 'password') {
            input.type = 'text';
            icon.classList.remove('bi-eye');
            icon.classList.add('bi-eye-slash');
        } else {
            input.type = 'password';
            icon.classList.remove('bi-eye-slash');
            icon.classList.add('bi-eye');
        }
    });
});
</script>

{% endblock %}
